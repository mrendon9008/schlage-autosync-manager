services:
  schlage-app:
    build: .
    container_name: schlage-app
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.schlage-docker.rule=Host(\`docker.schlage.henrimc.tech\`)"
      - "traefik.http.routers.schlage-docker.entrypoints=websecure"
      - "traefik.http.routers.schlage-docker.tls=true"
      - "traefik.http.services.schlage-docker.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik"
    volumes:
      - schlage-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

networks:
  traefik:
    external: true

volumes:
  schlage-data:
